name: Deploy to GitHub Pages

on:
  push:
    branches: [main]          # cambia in "master" se il tuo branch si chiama così
  workflow_dispatch:          # permette di lanciarlo manualmente da GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate guides.html from PDFs
        run: python3 inject_pdfs.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .          # carica tutta la cartella root come sito

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
